name: AwaitGoods
options:
  bundleIdPrefix: com.awaitgoods
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  AwaitGoods:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AwaitGoods
      - path: Shared
    info:
      path: AwaitGoods/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh_CN
        CFBundleDisplayName: 候物
        CFBundleURLTypes:
          - CFBundleURLName: com.awaitgoods.app
            CFBundleURLSchemes:
              - awaitgoods
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: AwaitGoods/AwaitGoods.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.awaitgoods
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.awaitgoods.app
        PRODUCT_NAME: "候物"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_PREVIEWS: YES
    dependencies:
      - target: AwaitGoodsWidgetExtension
        embed: true
  AwaitGoodsWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AwaitGoodsWidget
      - path: Shared
    info:
      path: AwaitGoodsWidget/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh_CN
        CFBundleDisplayName: 候物
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: AwaitGoodsWidget/AwaitGoodsWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.awaitgoods
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.awaitgoods.app.widget
        PRODUCT_NAME: AwaitGoodsWidgetExtension
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
schemes:
  AwaitGoods:
    build:
      targets:
        AwaitGoods: all
        AwaitGoodsWidgetExtension: all
    run:
      config: Debug
