name: AwaitGoods
options:
  bundleIdPrefix: com.awaitgoods
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
settings:
  base:
    MARKETING_VERSION: "1.0.5"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  AwaitGoods:
    type: application
    platform: iOS
    productName: 候物
    deploymentTarget: "17.0"
    sources:
      - path: AwaitGoods
      - path: Shared
    info:
      path: AwaitGoods/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh_CN
        CFBundleLocalizations:
          - en
          - zh_TW
          - zh_CN
          - ja
          - fr
          - de
          - it
          - ko
          - zh
        CFBundleDisplayName: 候物
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLName: com.awaitgoods.app
            CFBundleURLSchemes:
              - awaitgoods
        LSRequiresIPhoneOS: true
        LSApplicationCategoryType: public.app-category.utilities
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: AwaitGoods/AwaitGoods.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.awaitgoods
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.awaitgoods.app
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        PRODUCT_NAME: "候物"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "96DQ7VQS3P"
        ENABLE_PREVIEWS: YES
    dependencies:
      - target: AwaitGoodsWidgetExtension
        embed: true
  AwaitGoodsWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AwaitGoodsWidget
      - path: Shared
    info:
      path: AwaitGoodsWidget/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh_CN
        CFBundleLocalizations:
          - en
          - zh-Hans
          - zh-Hant
          - zh_CN
          - zh_TW
          - zh
        CFBundleDisplayName: 候物
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: AwaitGoodsWidget/AwaitGoodsWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.awaitgoods
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.awaitgoods.app.widget
        PRODUCT_NAME: AwaitGoodsWidgetExtension
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "96DQ7VQS3P"
schemes:
  AwaitGoods:
    build:
      targets:
        AwaitGoods: all
        AwaitGoodsWidgetExtension: all
    run:
      config: Debug
